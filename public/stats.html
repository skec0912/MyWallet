<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics — MyWallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
      <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h1.5a.75.75 0 000-1.5H18m-5.25 7.5h-1.5" />
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-slate-900">MyWallet</h1>
      <nav class="ml-auto flex items-center gap-1">
        <a href="/" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-100 transition">Expenses</a>
        <a href="/categories.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-100 transition">Categories</a>
        <a href="/stats.html" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-brand-50 text-brand-600">Statistics</a>
      </nav>
      <div id="user-menu" class="hidden ml-3 flex items-center gap-2 pl-3 border-l border-slate-200">
        <img id="user-avatar" src="" alt="" class="w-7 h-7 rounded-full object-cover bg-slate-200" />
        <span id="user-name" class="text-sm font-medium text-slate-700 max-w-[120px] truncate"></span>
        <a href="/auth/logout" class="ml-1 px-2.5 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:bg-slate-100 transition">Sign out</a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8 space-y-8">

    <!-- Page title + period selector -->
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-lg font-semibold text-slate-900">Statistics</h2>
        <p class="text-sm text-slate-500 mt-0.5">Visual overview of your spending</p>
      </div>
      <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-xl p-1">
        <button data-period="3"  class="period-btn px-3 py-1.5 rounded-lg text-sm font-medium transition">3 months</button>
        <button data-period="6"  class="period-btn px-3 py-1.5 rounded-lg text-sm font-medium transition">6 months</button>
        <button data-period="12" class="period-btn px-3 py-1.5 rounded-lg text-sm font-medium transition active">12 months</button>
      </div>
    </div>

    <!-- Summary strip -->
    <div id="summary-strip" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

    <!-- Charts row 1 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Donut: by category -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h3 class="text-sm font-semibold text-slate-700 mb-4">Spending by Category</h3>
        <div class="relative" style="height:280px">
          <canvas id="donut-chart"></canvas>
        </div>
        <div id="donut-legend" class="mt-4 grid grid-cols-2 gap-x-4 gap-y-1.5"></div>
      </div>

      <!-- Bar: monthly totals -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h3 class="text-sm font-semibold text-slate-700 mb-4">Monthly Spending</h3>
        <div class="relative" style="height:280px">
          <canvas id="bar-chart"></canvas>
        </div>
      </div>

    </div>

    <!-- Chart row 2: line — daily trend -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
        <h3 class="text-sm font-semibold text-slate-700">Daily Spending Trend</h3>
        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl p-1">
          <button data-view="daily"   class="view-btn px-3 py-1 rounded-lg text-xs font-medium transition active">Daily</button>
          <button data-view="cumul"   class="view-btn px-3 py-1 rounded-lg text-xs font-medium transition">Cumulative</button>
        </div>
      </div>
      <div class="relative" style="height:240px">
        <canvas id="line-chart"></canvas>
      </div>
    </div>

  </main>

  <script>
    // ── Auth guard ────────────────────────────────────────────────────────────
    (async () => {
      const res = await fetch('/auth/me');
      if (!res.ok) { location.replace('/login.html'); return; }
      const user = await res.json();
      document.getElementById('user-name').textContent = user.name;
      if (user.avatar) document.getElementById('user-avatar').src = user.avatar;
      document.getElementById('user-menu').classList.remove('hidden');
    })();

    // ── State ─────────────────────────────────────────────────────────────────
    let allExpenses = [];
    let activePeriod = 12;
    let activeView   = 'daily';
    let donutChart, barChart, lineChart;

    const fmt = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);

    // ── Palette ───────────────────────────────────────────────────────────────
    const PALETTE = [
      '#0ea5e9','#f97316','#ec4899','#8b5cf6','#10b981',
      '#f59e0b','#06b6d4','#6366f1','#14b8a6','#ef4444',
      '#84cc16','#a855f7','#fb923c','#34d399','#60a5fa',
    ];
    function colorFor(i) { return PALETTE[i % PALETTE.length]; }

    // ── Period filter ─────────────────────────────────────────────────────────
    function filteredExpenses() {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - activePeriod);
      const cutoffStr = cutoff.toISOString().slice(0, 10);
      return allExpenses.filter(e => e.date >= cutoffStr);
    }

    // ── Month labels helper ───────────────────────────────────────────────────
    function lastNMonths(n) {
      const months = [];
      const d = new Date();
      d.setDate(1);
      for (let i = n - 1; i >= 0; i--) {
        const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
        months.push(m.toISOString().slice(0, 7)); // "YYYY-MM"
      }
      return months;
    }

    function fmtMonth(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1).toLocaleString('en-US', { month: 'short', year: '2-digit' });
    }

    // ── Chart defaults ────────────────────────────────────────────────────────
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
    Chart.defaults.color = '#94a3b8';

    const gridOpts = {
      color: '#f1f5f9',
      drawBorder: false,
    };
    const tickOpts = { color: '#94a3b8', font: { size: 11 } };

    // ── Summary strip ─────────────────────────────────────────────────────────
    function renderSummary(expenses) {
      const total  = expenses.reduce((s, e) => s + e.amount, 0);
      const months = new Set(expenses.map(e => e.date.slice(0, 7))).size || 1;
      const avg    = total / months;
      const cats   = new Set(expenses.map(e => e.category)).size;
      const topCat = (() => {
        const t = {};
        expenses.forEach(e => { t[e.category] = (t[e.category] || 0) + e.amount; });
        return Object.entries(t).sort((a, b) => b[1] - a[1])[0]?.[0] ?? '—';
      })();

      const items = [
        { label: 'Total Spent',    value: fmt(total)            },
        { label: 'Monthly Avg',    value: fmt(avg)              },
        { label: 'Categories',     value: cats                  },
        { label: 'Top Category',   value: topCat, small: true   },
      ];

      document.getElementById('summary-strip').innerHTML = items.map(i => `
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm px-5 py-4">
          <p class="text-xs font-medium text-slate-500">${i.label}</p>
          <p class="mt-1 font-bold text-slate-900 ${i.small ? 'text-base truncate' : 'text-2xl'}">${i.value}</p>
        </div>
      `).join('');
    }

    // ── Donut chart ───────────────────────────────────────────────────────────
    function renderDonut(expenses) {
      const totals = {};
      expenses.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
      const sorted  = Object.entries(totals).sort((a, b) => b[1] - a[1]);
      const labels  = sorted.map(([k]) => k);
      const data    = sorted.map(([, v]) => v);
      const colors  = labels.map((_, i) => colorFor(i));
      const grand   = data.reduce((s, v) => s + v, 0);

      if (donutChart) donutChart.destroy();

      if (data.length === 0) {
        document.getElementById('donut-chart').closest('.relative').innerHTML =
          '<p class="absolute inset-0 flex items-center justify-center text-sm text-slate-400">No data</p>';
        document.getElementById('donut-legend').innerHTML = '';
        return;
      }

      donutChart = new Chart(document.getElementById('donut-chart'), {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '68%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${fmt(ctx.raw)}  (${Math.round(ctx.raw / grand * 100)}%)`,
              },
            },
          },
        },
      });

      document.getElementById('donut-legend').innerHTML = sorted.map(([cat, val], i) => `
        <div class="flex items-center gap-2 min-w-0">
          <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${colorFor(i)}"></span>
          <span class="text-xs text-slate-600 truncate flex-1">${cat}</span>
          <span class="text-xs font-semibold text-slate-800 flex-shrink-0">${fmt(val)}</span>
        </div>
      `).join('');
    }

    // ── Bar chart ─────────────────────────────────────────────────────────────
    function renderBar(expenses) {
      const months  = lastNMonths(activePeriod);
      const byMonth = {};
      months.forEach(m => { byMonth[m] = 0; });
      expenses.forEach(e => {
        const m = e.date.slice(0, 7);
        if (byMonth[m] !== undefined) byMonth[m] += e.amount;
      });

      if (barChart) barChart.destroy();

      barChart = new Chart(document.getElementById('bar-chart'), {
        type: 'bar',
        data: {
          labels: months.map(fmtMonth),
          datasets: [{
            label: 'Spending',
            data: months.map(m => byMonth[m]),
            backgroundColor: months.map((m, i, arr) => i === arr.length - 1 ? '#0ea5e9' : '#bae6fd'),
            borderRadius: 6,
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: { label: ctx => ` ${fmt(ctx.raw)}` },
            },
          },
          scales: {
            x: { grid: { display: false }, ticks: tickOpts },
            y: {
              grid: gridOpts,
              ticks: { ...tickOpts, callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(1) + 'k' : v) },
              border: { display: false },
            },
          },
        },
      });
    }

    // ── Line chart ────────────────────────────────────────────────────────────
    function renderLine(expenses) {
      // Build sorted daily totals within the period
      const byDay = {};
      expenses.forEach(e => { byDay[e.date] = (byDay[e.date] || 0) + e.amount; });
      const days   = Object.keys(byDay).sort();
      const values = days.map(d => byDay[d]);

      const data = activeView === 'cumul'
        ? values.reduce((acc, v) => { acc.push((acc[acc.length - 1] || 0) + v); return acc; }, [])
        : values;

      const labels = days.map(d => {
        const dt = new Date(d + 'T00:00:00');
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      if (lineChart) lineChart.destroy();

      if (days.length === 0) {
        document.getElementById('line-chart').closest('.relative').innerHTML =
          '<p class="absolute inset-0 flex items-center justify-center text-sm text-slate-400">No data</p>';
        return;
      }

      lineChart = new Chart(document.getElementById('line-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: activeView === 'cumul' ? 'Cumulative' : 'Daily',
            data,
            borderColor: '#0ea5e9',
            backgroundColor: 'rgba(14,165,233,0.08)',
            borderWidth: 2,
            pointRadius: days.length > 60 ? 0 : 3,
            pointHoverRadius: 5,
            fill: true,
            tension: 0.35,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: { label: ctx => ` ${fmt(ctx.raw)}` },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: {
                ...tickOpts,
                maxTicksLimit: 12,
                maxRotation: 0,
              },
            },
            y: {
              grid: gridOpts,
              ticks: { ...tickOpts, callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(1) + 'k' : v) },
              border: { display: false },
            },
          },
        },
      });
    }

    // ── Render all ────────────────────────────────────────────────────────────
    function renderAll() {
      const expenses = filteredExpenses();
      renderSummary(expenses);
      renderDonut(expenses);
      renderBar(expenses);
      renderLine(expenses);
    }

    // ── Period buttons ────────────────────────────────────────────────────────
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activePeriod = parseInt(btn.dataset.period);
        renderAll();
      });
    });

    // ── View buttons ──────────────────────────────────────────────────────────
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeView = btn.dataset.view;
        renderLine(filteredExpenses());
      });
    });

    // ── Active button style ───────────────────────────────────────────────────
    const style = document.createElement('style');
    style.textContent = `
      .period-btn.active, .view-btn.active {
        background: #0ea5e9; color: #fff;
      }
      .period-btn:not(.active), .view-btn:not(.active) {
        color: #64748b;
      }
      .period-btn:not(.active):hover, .view-btn:not(.active):hover {
        background: #f1f5f9;
      }
    `;
    document.head.appendChild(style);

    // ── Load & init ───────────────────────────────────────────────────────────
    (async () => {
      const res = await fetch('/api/expenses');
      if (!res.ok) return;
      allExpenses = await res.json();
      renderAll();
    })();
  </script>
</body>
</html>
